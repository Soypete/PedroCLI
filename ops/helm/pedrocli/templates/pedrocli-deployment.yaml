apiVersion: apps/v1
kind: Deployment
metadata:
  name: pedrocli-http
  namespace: {{ .Values.namespace }}
  labels:
    app: pedrocli-http
    app.kubernetes.io/name: pedrocli
    app.kubernetes.io/component: http-server
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: {{ .Values.pedrocli.replicas }}
  selector:
    matchLabels:
      app: pedrocli-http
  template:
    metadata:
      labels:
        app: pedrocli-http
        app.kubernetes.io/name: pedrocli
        app.kubernetes.io/component: http-server
    spec:
      containers:
      - name: pedrocli-http
        image: {{ .Values.pedrocli.image }}
        imagePullPolicy: {{ .Values.pedrocli.imagePullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.pedrocli.port }}
          protocol: TCP
        env:
        {{- range $key, $value := .Values.pedrocli.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        volumeMounts:
        - name: config
          mountPath: /home/pedrocli/.pedrocli.json
          subPath: .pedrocli.json
        resources:
          {{- toYaml .Values.pedrocli.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
      volumes:
      - name: config
        configMap:
          name: pedrocli-config
