apiVersion: v1
kind: Service
metadata:
  name: whisper
  namespace: {{ .Values.namespace }}
  labels:
    app: whisper
    app.kubernetes.io/name: whisper
    app.kubernetes.io/component: transcription
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    app: whisper
  ports:
  - name: http
    port: {{ .Values.whisper.port }}
    targetPort: http
    protocol: TCP
  type: ClusterIP
