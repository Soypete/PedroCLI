apiVersion: v1
kind: Service
metadata:
  name: pedrocli-http
  namespace: {{ .Values.namespace }}
  labels:
    app: pedrocli-http
    app.kubernetes.io/name: pedrocli
    app.kubernetes.io/component: http-server
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    app: pedrocli-http
  ports:
  - name: http
    port: {{ .Values.pedrocli.port }}
    targetPort: http
    protocol: TCP
  type: ClusterIP
