image:
  repository: your-registry/whisper-web-ui
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80

tailscale:
  enabled: true
  hostname: whisper        # resolves as whisper.<tailnet>.ts.net
  tags:
    - tag:k8s

whisperBackend:
  url: http://whisper-svc.ai-services.svc.cluster.local:8080

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
