apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-web-ui
  labels:
    app.kubernetes.io/name: whisper-web-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    {{- if .Values.tailscale.enabled }}
    tailscale.com/expose: "true"
    tailscale.com/hostname: "{{ .Values.tailscale.hostname }}"
    {{- if .Values.tailscale.tags }}
    tailscale.com/tags: "{{ join "," .Values.tailscale.tags }}"
    {{- end }}
    {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: whisper-web-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
