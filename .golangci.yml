version: "2"

run:
  timeout: 10m
  tests: true
  build-tags: []
  go: "1.26"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      # Exclude specific error checks in test files
      exclude-functions:
        - (io.Closer).Close
        - (*database/sql.Rows).Close
        - (*os.File).Close
    staticcheck:
      checks:
        - "SA*"  # Only run SA (analysis) checks; skip QF/S/ST style suggestions
  exclusions:
    paths:
      - vendor
    rules:
      # Exclude SA1019 deprecation warnings for jobs.Manager migration (in progress)
      - linters:
          - staticcheck
        text: "SA1019.*jobs\\.Manager|SA1019.*jobs\\.NewManager|SA1019.*pkg/jobs"
      # Exclude all errcheck in test files
      - path: _test\.go
        linters:
          - errcheck

      # Exclude errcheck for deferred cleanup in all files
      - linters:
          - errcheck
        text: "\\.(Cleanup|Stop)"

      # Exclude errcheck for job manager updates (fire and forget pattern)
      - linters:
          - errcheck
        text: "\\.jobManager\\.Update"

      # Exclude errcheck for context manager cleanup in agents
      - linters:
          - errcheck
        text: "contextMgr\\.Cleanup"

      # Exclude errcheck for process kill (best effort)
      - linters:
          - errcheck
        text: "Process\\.Kill"

      # Exclude errcheck for flag parsing (exits on error)
      - linters:
          - errcheck
        text: "fs\\.Parse"

      # Exclude errcheck for all Close calls (database, storage, files - best effort)
      - linters:
          - errcheck
        text: "\\.Close"

      # Exclude errcheck for HTTP response writes (already handled by HTTP stack)
      - path: pkg/httpbridge/
        linters:
          - errcheck

      # Exclude errcheck for voice client multipart writes (best effort)
      - path: pkg/voice/
        linters:
          - errcheck
        text: "WriteField"

      # Exclude errcheck for best-effort JSON operations
      - linters:
          - errcheck
        text: "\\.Unmarshal"

      # Exclude errcheck for fmt.Fprint/Fprintf in writers
      - linters:
          - errcheck
        text: "\\.Fprint"

      # Exclude errcheck for best-effort writes/flushes to output streams
      - linters:
          - errcheck
        text: "Stderr\\.Write|Logger\\.Flush"

      # Exclude errcheck for os.Remove/RemoveAll in cleanup
      - linters:
          - errcheck
        text: "\\.Remove"

      # Exclude errcheck for SavePrompt/SaveResponse/SaveToolCalls/SaveToolResults
      - linters:
          - errcheck
        text: "mgr\\.(Save|save)"

      # Exclude errcheck for navigate tree building (best effort)
      - path: pkg/tools/navigate\.go
        linters:
          - errcheck
        text: "buildTree"

      # Exclude staticcheck nil check warnings in repos executor
      - path: pkg/repos/executor\.go
        linters:
          - staticcheck
        text: "SA4031"

      # Exclude unused for intentionally unused test helpers
      - path: pkg/agents/
        linters:
          - unused
        text: "(buildSystemPrompt|executeInference|parseReview|extractIssueCount|postReviewToGitHub|getPRNumber|getSystemPrompt)"

      # Exclude unused for CI parser (future use)
      - path: pkg/hooks/ci_parser\.go
        linters:
          - unused
        text: "gitlabCI"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
